<div
  class="flex flex-col md:flex-row justify-between md:flex-row gap-4 px-4 md:px-28"
  id="contact"
>
  <div class="w-full md:w-1/2 flex flex-col gap-8 md:gap-16">
    <h2
      class="m-0 font-normal text-4xl md:text-6xl"
      style="font-family: var(--font-family)"
    >
      {{ "contact.title" | transloco }}
    </h2>
    <div class="hidden md:flex flex-col gap-2">
      <div class="flex items-center gap-3">
        <mat-icon class="icon" svgIcon="map-marker-outline"></mat-icon>
        <span class="text-xl">Matino (LE), Italia</span>
      </div>
      <div class="flex items-center gap-3">
        <mat-icon class="icon" svgIcon="email-outline"></mat-icon>
        <a href="mailto:lorisparata@gmail.com">
          <span class="text-xl">lorisparata&#64;gmail.com</span></a
        >
      </div>
      <div class="flex flex-row gap-4 mt-2">
        <a
          href="https://www.instagram.com/loris_parata/"
          target="_blank"
          rel="noopener"
          title="Instagram"
          class="flex items-center gap-3 hover:text-yellow-300 transition-colors"
        >
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 25 25">
            <title>Instagram</title>
            <path
              d="M7.8,2H16.2C19.4,2 22,4.6 22,7.8V16.2A5.8,5.8 0 0,1 16.2,22H7.8C4.6,22 2,19.4 2,16.2V7.8A5.8,5.8 0 0,1 7.8,2M7.6,4A3.6,3.6 0 0,0 4,7.6V16.4C4,18.39 5.61,20 7.6,20H16.4A3.6,3.6 0 0,0 20,16.4V7.6C20,5.61 18.39,4 16.4,4H7.6M17.25,5.5A1.25,1.25 0 0,1 18.5,6.75A1.25,1.25 0 0,1 17.25,8A1.25,1.25 0 0,1 16,6.75A1.25,1.25 0 0,1 17.25,5.5M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9Z"
            />
          </svg>
          <!-- <span class="text-xl">Instagram</span> -->
        </a>
        <a
          href="https://www.linkedin.com/in/loris-parata-735268173/"
          target="_blank"
          rel="noopener"
          title="LinkedIn"
          class="flex items-center gap-3 hover:text-yellow-300 transition-colors"
        >
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 25 25">
            <!-- <title>LinkedIn</title> -->
            <path
              d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17A1.4 1.4 0 0 1 15.71 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19A1.69 1.69 0 0 0 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"
            />
          </svg>
          <!-- <span class="text-xl">LinkedIn</span> -->
        </a>
      </div>
    </div>
  </div>
  <div class="w-full md:w-1/2 flex flex-col items-center">
    <div class="flex justify-between gap-2 w-full md:max-w-lg">
      <p class="mt-0 text-2xl md:text-xl">
        {{ "contact.description" | transloco }} <br />
        {{ "contact.description2" | transloco }}
      </p>
      <svg xmlns="https://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <path
          d="M88 0C74.7 0 64 10.7 64 24c0 38.9 23.4 59.4 39.1 73.1l1.1 1C120.5 112.3 128 119.9 128 136c0 13.3 10.7 24 24 24s24-10.7 24-24c0-38.9-23.4-59.4-39.1-73.1l-1.1-1C119.5 47.7 112 40.1 112 24c0-13.3-10.7-24-24-24zM32 192c-17.7 0-32 14.3-32 32L0 416c0 53 43 96 96 96l192 0c53 0 96-43 96-96l16 0c61.9 0 112-50.1 112-112s-50.1-112-112-112l-48 0L32 192zm352 64l16 0c26.5 0 48 21.5 48 48s-21.5 48-48 48l-16 0 0-96zM224 24c0-13.3-10.7-24-24-24s-24 10.7-24 24c0 38.9 23.4 59.4 39.1 73.1l1.1 1C232.5 112.3 240 119.9 240 136c0 13.3 10.7 24 24 24s24-10.7 24-24c0-38.9-23.4-59.4-39.1-73.1l-1.1-1C231.5 47.7 224 40.1 224 24z"
        />
      </svg>
    </div>
    <div class="flex flex-col gap-4 mb-8 w-full md:max-w-lg justify-center">
      @if (form()) {
        <form
          class="flex flex-col gap-12"
          [formGroup]="form()!"
          (ngSubmit)="onSubmit()"
        >
          <p-floatLabel class="mt-8">
            <input title="name" type="text" pInputText formControlName="name" />
            <label for="name">{{ "contact.yourName" | transloco }}</label>
          </p-floatLabel>
          <!-- <p-floatLabel>
          <input
            title="email"
            type="email"
            pInputText
            formControlName="email"
          />
          <label for="email">{{ 'contact.yourEmail' | transloco }}</label>
        </p-floatLabel> -->

          <p-floatLabel>
            <textarea
              title="body"
              rows="5"
              cols="30"
              pInputTextarea
              formControlName="body"
            ></textarea>

            <label for="body">{{ "contact.message" | transloco }}</label>
          </p-floatLabel>

          <button
            pButton
            title="Send message"
            type="submit"
            class="p-button primary w-full"
          >
            <span class="w-full flex justify-center">
              {{ "contact.sendMessage" | transloco }}
            </span>
          </button>
        </form>
      }
    </div>
    <div class="flex md:hidden flex-col gap-2 mb-4">
      <div class="flex items-center gap-3">
        <mat-icon class="icon" svgIcon="map-marker-outline"></mat-icon>
        <span class="text-xl">Matino (LE), Italia</span>
      </div>
      <div class="flex items-center gap-3">
        <mat-icon class="icon" svgIcon="email-outline"></mat-icon>
        <a href="mailto:lorisparata@gmail.com">
          <span class="text-xl">lorisparata&#64;gmail.com</span></a
        >
      </div>
      <div class="flex flex-row gap-4 mt-2">
        <a
          href="https://www.instagram.com/loris_parata/"
          target="_blank"
          rel="noopener"
          title="Instagram"
          class="flex items-center gap-3 hover:text-yellow-300 transition-colors"
        >
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 25 25">
            <!-- <title>Instagram</title> -->
            <path
              d="M7.8,2H16.2C19.4,2 22,4.6 22,7.8V16.2A5.8,5.8 0 0,1 16.2,22H7.8C4.6,22 2,19.4 2,16.2V7.8A5.8,5.8 0 0,1 7.8,2M7.6,4A3.6,3.6 0 0,0 4,7.6V16.4C4,18.39 5.61,20 7.6,20H16.4A3.6,3.6 0 0,0 20,16.4V7.6C20,5.61 18.39,4 16.4,4H7.6M17.25,5.5A1.25,1.25 0 0,1 18.5,6.75A1.25,1.25 0 0,1 17.25,8A1.25,1.25 0 0,1 16,6.75A1.25,1.25 0 0,1 17.25,5.5M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9Z"
            />
          </svg>
          <!-- <span class="text-xl">Instagram</span> -->
        </a>
        <a
          href="https://www.linkedin.com/in/loris-parata-735268173/"
          target="_blank"
          rel="noopener"
          title="LinkedIn"
          class="flex items-center gap-3 hover:text-yellow-300 transition-colors"
        >
          <svg width="24" height="24" fill="currentColor" viewBox="0 0 25 25">
            <!-- <title>LinkedIn</title> -->
            <path
              d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17A1.4 1.4 0 0 1 15.71 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19A1.69 1.69 0 0 0 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"
            />
          </svg>
          <!-- <span class="text-xl">LinkedIn</span> -->
        </a>
      </div>
    </div>
  </div>
</div>
