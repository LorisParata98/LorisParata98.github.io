<div
  class="flex flex-col md:grid md:grid-col-3 md:grid-flow-col md:gap-4 px-4 md:px-16"
  id="home"
>
  <div
    class="flex md:hidden justify-around md:justify-end md:px-32 py-4 pb-8 md:py-8"
  >
    <div class="flex gap-2">
      <button
        title="change language to italian button"
        type="button"
        class="p-button p-button-text"
        [ngClass]="{ active: selectedLanguage() == 'it' }"
        (click)="changeLanguage('it')"
      >
        ITA
      </button>
      <button
        title="change language to english button"
        type="button"
        class="p-button p-button-text"
        [ngClass]="{ active: selectedLanguage() == 'en' }"
        (click)="changeLanguage('en')"
      >
        ENG
      </button>
    </div>
  </div>

  <div class="social w-full md:w-10">
    <div
      class="hidden md:flex flex-col justify-between items-center h-full py-4"
    >
      <div class="hidden md:block vl"></div>

      <div
        class="hidden md:flex flex-row md:flex-col justify-between items-center gap-8 md:gap-12"
      >
        <div class="social-logo">
          <a
            href="https://angular.dev"
            target="_blank"
            rel="noopener"
            title="Angular docs"
          >
            <svg width="36" height="36" viewBox="0 0 48 48">
              <title>Angular</title>
              <path
                d="M43.6,9,24.3,2.1h-.6L4.3,9c-.3.1-.3.3-.3.6S6.6,32.7,6.9,35.9a.5.5,0,0,0,.4.6l16.3,9.4c.3.1.5.2.7,0l16.4-9.4a1,1,0,0,0,.4-.5c.3-2.6,2.7-24.5,2.9-26.6C44.1,9.1,43.8,9.1,43.6,9ZM36.3,34.2H32.4a.5.5,0,0,1-.6-.4L29.7,28a.5.5,0,0,0-.6-.4H18.8c-.3,0-.4.1-.5.4l-2.1,5.7c-.2.4-.3.5-.7.5H11.2C15.5,24.7,19.7,15.3,24,5.8L36.7,34.1Z"
              />
              <path d="M27.8,23.8H20.2c1.2-3,2.5-6,3.8-9Z" />
            </svg>
          </a>
        </div>
        <div class="social-logo">
          <a
            href="https://vuejs.org"
            target="_blank"
            rel="noopener"
            title="Vue docs"
          >
            <svg width="36" height="36" viewBox="0 0 512 512">
              <title>Vue</title>
              <polygon
                points="256 144.03 200.51 47.92 121.08 47.92 256 281.61 390.92 47.92 311.49 47.92 256 144.03"
              />
              <polygon
                points="409.4 47.92 256 313.61 102.6 47.92 15.74 47.92 256 464.08 496.26 47.92 409.4 47.92"
              />
            </svg>
          </a>
        </div>
        <div class="social-logo">
          <a
            href="https://flutter.dev"
            target="_blank"
            rel="noopener"
            title="Flutter docs"
          >
            <svg width="36" height="36" viewBox="0 0 24 24">
              <title>Flutter</title>
              <path
                fill-rule="nonzero"
                d="M13.503 2.001l-10 10 3.083 3.083 13.08-13.083h-6.163zm-.006 9.198L8.122 16.62 13.494 22h6.189l-5.387-5.4 5.389-5.4h-6.188z"
              />
            </svg>
          </a>
        </div>
      </div>
      <div class="hidden md:block vl"></div>
    </div>
  </div>

  <div class="col-span-10">
    <div class="flex flex-col justify-end h-full md:p-8 gap-2 md:gap-3">
      <div class="flex flex-col gap-0">
        <h1 class="m-0 font-normal text-5xl md:text-7xl">
          <span> {{ "intro.presentation" | transloco }}</span
          ><br />
          <span> {{ "intro.presentation2" | transloco }}</span>
        </h1>
        <div
          class="flex items-center text-xl md:text-2xl"
          style="min-height: 36px"
        >
          <span>{{ typewriterText() }}</span>
          <span class="cursor-blink"></span>
        </div>
      </div>

      <p
        class="m-0 text-white/60 text-sm md:text-base max-w-xl leading-relaxed"
      >
        {{ "intro.description" | transloco }}
      </p>
    </div>
  </div>

  <div class="hidden md:block">
    <div class="flex flex-col items-end h-full py-4">
      <div class="vl-2-short pe-4"></div>
      <div class="vl-2 pe-4"></div>
    </div>
  </div>
</div>

<div class="hidden md:flex justify-around md:justify-end md:px-32 py-4 md:py-8">
  <div class="flex gap-2">
    <button
      title="change language to italian button"
      type="button"
      class="p-button p-button-text"
      [ngClass]="{ active: selectedLanguage() == 'it' }"
      (click)="changeLanguage('it')"
    >
      ITA
    </button>
    <button
      title="change language to english button"
      type="button"
      class="p-button p-button-text"
      [ngClass]="{ active: selectedLanguage() == 'en' }"
      (click)="changeLanguage('en')"
    >
      ENG
    </button>
  </div>
</div>
