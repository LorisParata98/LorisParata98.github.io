<article
  class="flex flex-col justify-between p-5 w-full h-80 rounded-lg border border-white/10 bg-white/5 hover:border-yellow-300/40 hover:bg-white/10 transition-all duration-300 cursor-pointer group"
  (click)="onClick()"
>
  <div class="flex flex-col gap-3 min-h-0">
    <div
      class="relative w-full h-36 rounded-md overflow-hidden bg-black/40 border border-white/10"
    >
      <img
        [src]="project()?.images?.[0] || 'assets/images/projects/default.webp'"
        [alt]="project()?.nome"
        class="w-full h-full object-cover transition-all duration-300 group-hover:scale-105"
        (error)="onImageError($event)"
      />
    </div>

    <h4
      class="m-0 font-medium text-white leading-snug group-hover:text-yellow-300 transition-colors"
    >
      {{ project()?.nome }}
    </h4>

    <p
      class="m-0 text-sm text-white/50 leading-relaxed line-clamp-2"
    >
      {{ project()?.descrizione }}
    </p>
  </div>

  <div class="flex flex-wrap gap-1.5 pt-3">
    @for (tech of project()?.tecnologie || []; track tech) {
      <span
        class="text-xs font-semibold px-2.5 py-1 rounded-full border border-yellow-300/40 text-yellow-300"
      >
        {{ tech }}
      </span>
    }
  </div>
</article>
