<section
  class="flex flex-col gap-12 md:gap-20 px-4 md:px-28 my-8"
  id="projects-list"
>
  <div class="flex flex-col gap-2">
    <h1 class="m-0">{{ "projects.myProjects" | transloco }}</h1>
    <p class="m-0 text-white/60 text-lg md:text-xl max-w-3xl">
      {{ "projects.intro" | transloco }}
    </p>
  </div>

  <!-- Filtri -->
  <div class="flex flex-col gap-3">
    <div class="flex flex-wrap gap-2">
      @for (tech of allTecnologie; track tech) {
        <button
          class="text-xs font-semibold px-3 py-1.5 rounded-full border transition-all duration-200"
          [class]="
            isSelected(tech)
              ? 'border-yellow-300 bg-yellow-300 text-black'
              : 'border-white/20 text-white/60 hover:border-yellow-300/40 hover:text-white'
          "
          (click)="toggleTecnologia(tech)"
        >
          {{ tech }}
        </button>
      }
    </div>

    <button
      class="self-start text-xs text-white/40 hover:text-white underline transition-colors"
      [class.invisible]="selectedTecnologie().size === 0"
      [attr.aria-hidden]="selectedTecnologie().size === 0 ? 'true' : null"
      [attr.tabindex]="selectedTecnologie().size === 0 ? -1 : null"
      (click)="clearFilters()"
    >
      {{ "projects.clearFilters" | transloco }}
    </button>
  </div>

  <!-- Sezioni per anno -->
  @for (section of sections(); track section.year) {
    <div class="flex flex-col gap-4">
      <div class="flex items-center justify-between gap-4">
        <h2 class="m-0 text-4xl md:text-6xl [font-family:var(--font-family)]">
          {{ section.year }}
        </h2>
        <div class="flex gap-2 shrink-0">
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full border border-current transition-opacity"
            [class.opacity-20]="!carousel.canPrev()"
            [class.cursor-not-allowed]="!carousel.canPrev()"
            [class.opacity-60]="carousel.canPrev()"
            [class.hover:opacity-100]="carousel.canPrev()"
            [disabled]="!carousel.canPrev()"
            (click)="carousel.prev()"
            aria-label="Precedente"
          >&#8592;</button>
          <button
            class="w-8 h-8 flex items-center justify-center rounded-full border border-current transition-opacity"
            [class.opacity-20]="!carousel.canNext()"
            [class.cursor-not-allowed]="!carousel.canNext()"
            [class.opacity-60]="carousel.canNext()"
            [class.hover:opacity-100]="carousel.canNext()"
            [disabled]="!carousel.canNext()"
            (click)="carousel.next()"
            aria-label="Successivo"
          >&#8594;</button>
        </div>
      </div>

      <app-carousel #carousel [items]="section.projects" (select)="onSelect($event)" />
    </div>
  }

  @if (sections().length === 0) {
    <p class="text-white/40 text-sm">
      {{ "projects.noResults" | transloco }}
    </p>
  }
</section>
<app-project-drawer
  [project]="selectedProject()"
  (close)="selectedProject.set(null)"
/>
